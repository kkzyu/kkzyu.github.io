<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Word Cloud Generator</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
    <link rel="stylesheet" href="../css/wordCloud.css">
</head>

<body>
    <h4>Word Cloud Generator</h4>
    <div id="controls">
        <label>选择本地文件:
            <input type="file" id="fileInput" accept=".txt">
        </label>
        <button onclick="loadDefaultFile()">使用默认文件</button>
        <button onclick="generateWordCloud()">点击生成词云图</button>
        <button onclick="randomizeSettings()">随机设置展示样式</button>
        <button onclick="downloadWordCloud()">下载词云图</button>
        <div class="break-after"></div>
        <label>颜色: <input type="color" id="colorPicker" value="#000000"></label>
        <label>旋转: <input type="checkbox" id="rotateToggle"></label>
        <label>彩虹色:
            <input type="checkbox" id="rainbowToggle">
        </label>
        <label>展示数量:
            <select id="wordCount">
                <option value="100">100</option>
                <option value="200">200</option>
                <option value="300">300</option>
                <option value="400">400</option>

            </select>
        </label>
        <label>画布大小:
            <input type="number" id="width" value="600" style="width:60px;"> x
            <input type="number" id="height" value="400" style="width:60px;">
        </label>
    </div>

    <div id="loading">正在加载中...</div>
    <svg id="wordCloud"></svg>
    <script src="../js/wordCloud.js"></script>
</body>

</html>
